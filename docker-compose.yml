version: '3.8'

services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_USER: clement
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "127.0.0.1:5439:5432"  # 127.0.0.1 => Bind to localhost for security
 
volumes:
  postgres_data:

